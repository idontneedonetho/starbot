services:
  starbot:
    build: .
    container_name: starbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./repo-cache:/app/repo-cache
    environment:
      - NODE_OPTIONS=--max-old-space-size=192
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
